/* ══════════════════════════════════════════
   RESULTS: Compute
══════════════════════════════════════════ */
const CAT_NAMES  = ['성장', '배당', '헷지'];
const CAT_COLORS = ['#4fc3f7', '#81c784', '#ffb74d'];
const CAT_DOTS   = ['dot-growth', 'dot-dividend', 'dot-hedge'];

function calcPortfolio() {
  const current = { 성장: 0, 배당: 0, 헷지: 0 };
  state.stocks.forEach(s => { const v = parseInt(unformat(s.value ?? '')) || 0; if (current[s.category] !== undefined) current[s.category] += v; });
  const total = CAT_NAMES.reduce((a, c) => a + current[c], 0);
  const { growth: gr, dividend: dr, hedge: hr } = state.ratios;
  const rs = gr + dr + hr || 10;
  const target = { 성장: Math.round(total * gr / rs), 배당: Math.round(total * dr / rs), 헷지: Math.round(total * hr / rs) };
  const diff = { 성장: target.성장 - current.성장, 배당: target.배당 - current.배당, 헷지: target.헷지 - current.헷지 };
  const stockAdj = CAT_NAMES.flatMap(cat => {
    const catStocks = state.stocks.filter(s => s.category === cat);
    const catTotal  = catStocks.reduce((s, x) => s + (parseInt(unformat(x.value ?? '')) || 0), 0);
    return catStocks.map(s => { const v = parseInt(unformat(s.value ?? '')) || 0; const prop = catTotal > 0 ? v / catTotal : 1 / (catStocks.length || 1); return { ...s, currentVal: v, adj: Math.round(diff[cat] * prop) }; });
  });
  return { current, target, diff, total, stockAdj };
}

/* 월 예상 분배금 계산 */
function calcMonthlyDividend() {
  return state.stocks.map(s => {
    const val  = parseInt(unformat(s.value ?? '')) || 0;
    const rate = parseFloat(s.dividendRate) || 0;
    return { name: s.name, rate, monthly: Math.round(val * rate / 100 / 12) };
  }).filter(d => d.monthly > 0);
}

/* 포트폴리오 점수 계산 (100점 만점) */
function calcPortfolioScore() {
  const age     = getAge();
  const horizon = getHorizon();
  const a       = calcPortfolio();
  const { current, target, total } = a;
  const monthly = parseInt(unformat(state.investment.monthly ?? '')) || 0;
  const { growth: gr, dividend: dr, hedge: hr } = state.ratios;
  const rs = gr + dr + hr || 10;
  const investorType = state.profile?.investorType || 'both';

  // ① 비율 정확도 (30점): 현재 vs 목표 비율 차이가 적을수록 높은 점수
  let ratioScore = 30;
  if (total > 0) {
    ['성장','배당','헷지'].forEach(c => {
      const curPct = current[c] / total * 100;
      const tgtPct = target[c] / total * 100;
      ratioScore -= Math.min(10, Math.abs(curPct - tgtPct) * 0.7);
    });
  }
  ratioScore = Math.max(0, Math.round(ratioScore));

  // ② 분산도 (20점): 보유 종목 수
  const stockCount = state.stocks.length;
  const diversScore = stockCount >= 8 ? 20 : stockCount >= 5 ? 15 : stockCount >= 3 ? 10 : stockCount >= 1 ? 5 : 0;

  // ③ 나이 적합성 (25점)
  let ageScore = 25;
  if (total > 0) {
    const growthPct = current['성장'] / total * 100;
    const hedgePct  = current['헷지']  / total * 100;
    if (age < 35) {
      // 젊은 투자자: 성장 비중 높으면 좋음
      ageScore = growthPct >= 50 ? 25 : growthPct >= 30 ? 18 : 10;
    } else if (age < 50) {
      // 중장년: 균형 잡힌 포트폴리오
      const balanced = Math.abs(growthPct - 50) < 20;
      ageScore = balanced ? 25 : 15;
    } else {
      // 은퇴 준비: 헷지/배당 비중 높으면 좋음
      ageScore = hedgePct >= 30 ? 25 : hedgePct >= 20 ? 18 : 10;
    }
  }

  // ④ 적립 계획 (15점): 월 적립금 설정 여부
  const accScore = investorType === 'rebalance' ? 15
    : monthly > 0 ? 15 : 0;

  // ⑤ 절세계좌 활용 (10점)
  const ta = state.taxAccounts;
  const totalTax = ['pensionTax','irp','pensionNoTax','isa']
    .reduce((s, k) => s + (parseInt(unformat(ta[k].contribution ?? '')) || 0), 0);
  const taxScore = totalTax >= 500000 ? 10 : totalTax >= 200000 ? 7 : totalTax > 0 ? 4 : 0;

  const total_score = Math.min(100, ratioScore + diversScore + ageScore + accScore + taxScore);
  const grade = total_score >= 90 ? 'S' : total_score >= 80 ? 'A' : total_score >= 70 ? 'B' : total_score >= 55 ? 'C' : 'D';
  const gradeColor = total_score >= 80 ? '#4ade80' : total_score >= 65 ? '#f0c040' : '#ff6b6b';

  return {
    total: total_score, grade, gradeColor, horizon,
    items: [
      { label: '비율 정확도', score: ratioScore,  max: 30, color: '#7dd3fc' },
      { label: '분산도',     score: diversScore, max: 20, color: '#81c784' },
      { label: '나이 적합성', score: ageScore,    max: 25, color: '#ffb74d' },
      { label: '적립 계획',   score: accScore,    max: 15, color: '#ce93d8' },
      { label: '절세계좌',   score: taxScore,    max: 10, color: '#4fc3f7' },
    ],
  };
}

function calcGoalSim(goal) {
  const rem = calcRemaining(goal.targetYear, goal.targetMonth);
  const now = new Date(), tgt = new Date(Number(goal.targetYear), Number(goal.targetMonth) - 1, 1);
  const totalMonths = Math.max(1, Math.round((tgt - now) / (1000 * 60 * 60 * 24 * 30.44)));
  const targetAmt = parseInt(unformat(goal.targetAmount ?? '')) || 0;
  const currentTotal = parseInt(unformat(state.investment.total ?? '')) || 0;
  const monthly = parseInt(unformat(state.investment.monthly ?? '')) || 0;
  const expectedAtTarget = currentTotal + monthly * totalMonths;
  const progress = targetAmt > 0 ? Math.min(100, Math.round(currentTotal / targetAmt * 100)) : 0;
  const requiredMonthly = targetAmt > currentTotal ? Math.ceil((targetAmt - currentTotal) / totalMonths) : 0;
  return { rem, feasible: expectedAtTarget >= targetAmt, targetAmt, currentTotal, monthly, totalMonths, expectedAtTarget, progress, requiredMonthly };
}

/* ── Donut Chart ── */
function drawDonut(canvasId, segments, colors) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 3), D = 120;
  canvas.width = D * dpr; canvas.height = D * dpr;
  canvas.style.width = D + 'px'; canvas.style.height = D + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = D/2, cy = D/2, R = D/2 - 7, r = R * 0.58, mid = (R+r)/2, lw = R - r;
  ctx.clearRect(0, 0, D, D);
  const total = segments.reduce((a, v) => a + v, 0);
  if (!total) { ctx.beginPath(); ctx.arc(cx, cy, mid, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = lw; ctx.stroke(); return; }
  const GAP = segments.filter(v => v > 0).length > 1 ? 0.07 : 0;
  let angle = -Math.PI / 2;
  segments.forEach((val, i) => {
    if (!val) return;
    const sweep = (val / total) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(cx, cy, mid, angle + GAP/2, angle + sweep - GAP/2);
    ctx.strokeStyle = colors[i]; ctx.lineWidth = lw; ctx.stroke();
    angle += sweep;
  });
}

  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 추천 중…'; }
  box.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:12px 0"><span class="spinner"></span> 분석 중…</div>`;
  const list = state.stocks.map(s => s.name ? `${s.name}(${s.category})` : null).filter(Boolean).join(', ');
  if (!list) { box.innerHTML = '<div class="muted-note">종목명이 입력된 종목이 없습니다.</div>'; if (btn) { btn.disabled = false; btn.innerHTML = '✨ AI 추천 받기'; } return; }
  try {
    const text = await callClaude(`다음 ETF 목록에서 카테고리별로 월 적립에 적합한 순서를 추천해줘. 종목목록: ${list}. JSON으로만 응답: {"성장": [{"name": "종목명", "reason": "이유"}], "배당": [{"name": "종목명", "reason": "이유"}], "헷지": [{"name": "종목명", "reason": "이유"}]}`);
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('파싱 실패');
    state.aiRecs = JSON.parse(match[0]); state.checkedRecs = state.checkedRecs || {}; save();
    box.innerHTML = renderRecList(state.aiRecs);
    if (btn) btn.style.display = 'none';
    bindRecCheckboxes();
  } catch(e) {
    box.innerHTML = `<div class="muted-note" style="color:var(--danger)">오류: ${esc(e.message)}</div>`;
    if (btn) { btn.disabled = false; btn.innerHTML = '✨ AI 추천 받기'; }
  }
}

function renderRecList(recs) {
  if (!recs) return '';
  return CAT_NAMES.map((cat, i) => {
    const items = (recs[cat] || []).filter(x => x?.name);
    if (!items.length) return '';
    return `<div class="rec-cat">
      <div class="rec-cat-label"><span class="dot ${CAT_DOTS[i]}"></span>${cat}</div>
      ${items.map(item => `<label class="rec-item"><input type="checkbox" class="rec-cb" data-name="${esc(item.name)}"${state.checkedRecs?.[item.name] ? ' checked' : ''}><div class="rec-item-body"><div class="rec-item-name">${esc(item.name)}</div><div class="rec-item-reason">${esc(item.reason || '')}</div></div></label>`).join('')}
    </div>`;
  }).join('');
}

function bindRecCheckboxes() {
  document.getElementById('recBox')?.addEventListener('change', e => {
    if (e.target.classList.contains('rec-cb')) { if (!state.checkedRecs) state.checkedRecs = {}; state.checkedRecs[e.target.dataset.name] = e.target.checked; save(); }
  });
}

/* ── Copy text ── */
function buildCopyText(analysis) {
  const { current, target, diff, total } = analysis;
  const now = new Date().toLocaleDateString('ko-KR');
  const monthly = parseInt(unformat(state.investment.monthly ?? '')) || 0;
  const { growth: gr, dividend: dr, hedge: hr } = state.ratios, rs = gr + dr + hr || 10;
  const lines = [`📊 ETF 포트폴리오 분석 결과 (${now})`, `총 평가금액: ${fmt(total)}원`, '', '[ 현재 → 목표 리밸런싱 ]',
    ...CAT_NAMES.map(c => { const d = diff[c]; return `${c}: ${fmt(current[c])}원 → ${fmt(target[c])}원 (${d > 0 ? '매수 +' : d < 0 ? '매도 -' : '±'}${fmt(Math.abs(d))}원)`; })];
  if (monthly) { lines.push('', '[ 월 적립 배분 ]', `월 적립금: ${fmt(monthly)}원`); [gr, dr, hr].forEach((r, i) => lines.push(`${CAT_NAMES[i]}: ${fmt(Math.round(monthly * r / rs))}원`)); }
  if (state.goals.length) { lines.push('', '[ 목적자금 시뮬레이션 ]'); state.goals.forEach(g => { const sim = calcGoalSim(g); lines.push(`${g.name||'(이름없음)'}: 목표 ${fmt(sim.targetAmt)}원 / ${sim.rem?.text||''} / ${sim.feasible ? '✓ 달성 가능' : `월 ${fmt(sim.requiredMonthly)}원 필요`}`); }); }
  if (state.aiComment) lines.push('', '[ AI 분석 ]', state.aiComment);
  return lines.join('\n');
}

/* ══════════════════════════════════════════
   RESULTS: Render
══════════════════════════════════════════ */
function renderResults() {

            <div class="donut-wrap"><canvas id="donutCurrent"></canvas><div class="donut-label">현재 비율</div></div>

          <div class="cat-table">
            <div class="cat-table-head"><div>분류</div><div>현재</div><div>목표</div><div>차이</div></div>

}

function bindResults() {
  const a = calcPortfolio();
  requestAnimationFrame(() => {
    drawDonut('donutCurrent', CAT_NAMES.map(c => a.current[c] || 0), CAT_COLORS);
    drawDonut('donutTarget',  CAT_NAMES.map(c => a.target[c]  || 0), CAT_COLORS);
  });
  if (getApiKey() && !state.aiComment) aiPortfolioComment(a);
  document.getElementById('btnRefreshComment')?.addEventListener('click', () => { state.aiComment = ''; save(); renderStep(false); });
  document.getElementById('btnAiRecs')?.addEventListener('click', aiStockRecommendations);
  document.getElementById('btnAiEval')?.addEventListener('click', aiComprehensiveEval);
  document.getElementById('btnRefreshEval')?.addEventListener('click', () => { state.aiEval = ''; save(); renderStep(false); });
  if (state.aiRecs) bindRecCheckboxes();
  document.getElementById('btnCopyResult').addEventListener('click', () => {
    const text = buildCopyText(a);
    if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => showToast('✓ 클립보드에 복사되었습니다.')).catch(() => fallbackCopy(text));
    else fallbackCopy(text);
  });
  document.getElementById('btnBackStep5').addEventListener('click', () => go(5));
  document.getElementById('btnRestart').addEventListener('click', () => {
    if (!confirm('처음부터 다시 시작하시겠습니까?\n(API 키·종목 정보는 유지됩니다)')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = DEFAULT_STATE();
    try { state.stocks = JSON.parse(localStorage.getItem(STOCKS_KEY)) || []; } catch(_) {}
    state.step = 0;
    save(); renderStep(); showToast('초기화 완료');
  });
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('✓ 클립보드에 복사되었습니다.'); } catch (_) { showToast('복사 실패 — 직접 선택해주세요.', true); }
  ta.remove();
}

/* ══════════════════════════════════════════
   CONFIRM MODAL
══════════════════════════════════════════ */
function showConfirm(msg, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="confirm-msg">${msg}</div>
      <div class="confirm-btns">
        <button class="confirm-cancel">취소</button>
        <button class="confirm-ok">삭제</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.confirm-cancel').onclick = () => overlay.remove();
  overlay.querySelector('.confirm-ok').onclick = () => { overlay.remove(); onOk(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'28px', left:'50%', transform:'translateX(-50%) translateY(8px)',
    background: isError ? 'rgba(60,20,20,0.96)' : 'rgba(20,36,54,0.96)',
    color: isError ? '#ff8888' : '#f0c040',
    padding:'11px 20px', borderRadius:'10px', fontSize:'13px', zIndex:9999,
    border:`1px solid ${isError ? 'rgba(255,107,107,0.35)' : 'rgba(240,192,64,0.3)'}`,
    backdropFilter:'blur(10px)', whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.45)',
    opacity:'0', transition:'opacity .2s, transform .2s', maxWidth:'90vw',
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)'; setTimeout(() => t.remove(), 250); }, 2600);
}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
function go(n, scroll = true) { state.step = n; save(); renderStep(scroll); }

function renderStep(scroll = true) {
  renderBar();
  const el = document.getElementById('stepContent');
  switch (state.step) {
    case 0: el.innerHTML = renderStep0();   bindStep0();   break;
    case 1: el.innerHTML = renderStep1();   bindStep1();   break;
    case 2: el.innerHTML = `<div class="step-narrow">${renderStep2()}</div>`;   bindStep2();   break;
    case 3: el.innerHTML = `<div class="step-narrow">${renderStep3()}</div>`;   bindStep3();   break;
    case 4: el.innerHTML = `<div class="step-narrow">${renderStep4()}</div>`;   bindStep4();   break;
    case 5: el.innerHTML = `<div class="step-narrow">${renderStep5()}</div>`;   bindStep5();   break;
    case 6: el.innerHTML = renderResults(); bindResults(); break;
    default: state.step = 1; el.innerHTML = renderStep1(); bindStep1();
  }
  if (scroll) window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════════════════════════════════
   API PANEL
══════════════════════════════════════════ */
function updateApiStatus() {
  const key = getApiKey(), statusEl = document.getElementById('apiStatus'), inputEl = document.getElementById('apiKeyInput');
  if (key) { statusEl.textContent = `✓ API 키 설정됨: ${key.slice(0,14)}••••${key.slice(-4)}`; statusEl.className = 'api-status ok'; inputEl.value = ''; inputEl.placeholder = '새 키를 입력하면 덮어씁니다'; }
  else { statusEl.textContent = 'API 키 미설정 — AI 기능이 비활성화됩니다.'; statusEl.className = 'api-status none'; }
}

function updateSbStatus() {
  const { url, anonKey } = getSupabaseCfg();
  const el = document.getElementById('sbStatus');
  const urlIn = document.getElementById('sbUrlInput');
  const keyIn = document.getElementById('sbAnonInput');
  if (!el) return;
  if (url && anonKey) {
    const host = url.replace('https://', '').split('.')[0];
    el.textContent = `✓ 연결됨: ${host}.supabase.co`;
    el.className = 'api-status ok';
    if (urlIn) { urlIn.value = ''; urlIn.placeholder = url; }
    if (keyIn) { keyIn.value = ''; keyIn.placeholder = '새 키를 입력하면 덮어씁니다'; }
    const ts = localStorage.getItem('etf_stock_cache_ts');
    if (ts) {
      const days = Math.floor((Date.now() - Number(ts)) / 86400000);
      el.textContent += ` — 종목 DB ${days === 0 ? '오늘' : days + '일 전'} 업데이트`;
    }
  } else {
    el.textContent = '미설정 — 내장 ETF 목록만 사용합니다.';
    el.className = 'api-status none';
  }
}

document.getElementById('btnApiToggle').onclick = () => {
  const panel = document.getElementById('apiPanel'), btn = document.getElementById('btnApiToggle');
  panel.classList.toggle('hidden'); btn.classList.toggle('active', !panel.classList.contains('hidden'));
  if (!panel.classList.contains('hidden')) { updateApiStatus(); updateSbStatus(); }
};
document.getElementById('btnSaveKey').onclick = () => {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { showToast('API 키를 입력해주세요.', true); return; }
  if (!val.startsWith('sk-ant-')) { showToast('올바른 Claude API 키 형식이 아닙니다.', true); return; }
  setApiKey(val); updateApiStatus(); showToast('✓ API 키가 저장되었습니다.');
  if (state.step === 1) renderStep(false);
};
document.getElementById('btnSaveSb').onclick = () => {
  const url = document.getElementById('sbUrlInput').value.trim() || getSupabaseCfg().url || '';
  const anonKey = document.getElementById('sbAnonInput').value.trim() || getSupabaseCfg().anonKey || '';
  if (!url || !anonKey) { showToast('URL과 Anon Key를 모두 입력해주세요.', true); return; }
  if (!url.startsWith('https://')) { showToast('URL은 https://로 시작해야 합니다.', true); return; }
  setSupabaseCfg({ url: url.replace(/\/$/, ''), anonKey });
  updateSbStatus(); showToast('✓ Supabase 설정 저장됨');
};
document.getElementById('btnSyncKis').onclick = syncKisToSupabase;
document.getElementById('btnReset').onclick = () => {
  if (!confirm('초기화하시겠습니까?\n(API 키·종목 정보는 유지됩니다)')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = DEFAULT_STATE();
  try { state.stocks = JSON.parse(localStorage.getItem(STOCKS_KEY)) || []; } catch(_) {}
  state.step = 0;
  save(); renderStep(); showToast('초기화 완료');
};

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
// 데이터 복원 후 프로필 미설정이면 0단계, 설정됐으면 1단계부터
load();
state.step = state.profile?.investorType ? 1 : 0;
try {
  const savedStocks = JSON.parse(localStorage.getItem(STOCKS_KEY));
  if (Array.isArray(savedStocks) && savedStocks.length) state.stocks = savedStocks;
} catch (_) {}
updateApiStatus();
renderStep();

// 비동기: Supabase에서 포트폴리오 로드 (로컬 데이터보다 최신이면 덮어씀)
loadPortfolioFromSupabase().then(stocks => {
  if (stocks && stocks.length) {
    state.stocks = stocks;
    localStorage.setItem(STOCKS_KEY, JSON.stringify(stocks));
    if (state.step === 1) renderStep(false);
  }
}).catch(() => {});
</script>
